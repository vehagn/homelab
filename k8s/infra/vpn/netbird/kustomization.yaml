apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - agent-setup-key.yaml
  - relay-secret.yaml
  - coturn-credentials.yaml
  - authelia-oidc-credentials.yaml
  - secret-management.yaml

helmCharts:
  - name: netbird
    repo: https://vehagn.github.io/helms
    version: 1.11.4 # renovate: github-releases=netbirdio/helms
    releaseName: netbird
    namespace: netbird
    valuesFile: netbird-values.yaml

