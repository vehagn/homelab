apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - grafana.yaml
  - http-route.yaml
  - admin-credentials.yaml
  - datasources/kube-prometheus-stack-alertmanager.yaml
  - datasources/kube-prometheus-stack-prometheus.yaml

helmCharts:
  - name: grafana-operator
    repo: oci://ghcr.io/grafana/helm-charts
    includeCRDs: true
    namespace: grafana
    version: v5.18.0 # renovate: github-releases=grafana/grafana-operator
    releaseName: grafana-operator
    valuesFile: ./values.yaml
