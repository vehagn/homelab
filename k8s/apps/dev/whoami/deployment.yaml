apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      namespace: whoami
      labels:
        app: whoami
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      #securityContext:
      #  runAsNonRoot: true
      #  runAsUser: 999
      #  runAsGroup: 999
      #  fsGroup: 999
      #  fsGroupChangePolicy: OnRootMismatch
      #  seccompProfile:
      #    type: RuntimeDefault
      containers:
        - name: whoami
          #image: ghcr.io/nicolaka/netshoot:v0.15
          image: ubuntu
          #command: [ /opt/whoami/whoami ]
          command: [ sleep, infinity ]
          #securityContext:
          #  allowPrivilegeEscalation: false
          #  readOnlyRootFilesystem: true
          #  capabilities:
          #    drop: [ "ALL" ]
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: whoami
              mountPath: /opt/whoami
            #- name: volume
            #  mountPath: /volume
          resources:
            requests:
              cpu: 50m
              memory: 12Mi
            limits:
              cpu: 1000m
              memory: 24Mi
      volumes:
        - name: whoami
          image:
            reference: ghcr.io/traefik/whoami:latest
            pullPolicy: Always
        #- name: volume
        #  image:
        #    reference: quay.io/crio/artifact:v2
        #    pullPolicy: Always
