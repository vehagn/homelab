apiVersion: v1
kind: Service
metadata:
  name: local-dsr
  namespace: whoami
  annotations:
    io.cilium/lb-ipam-ips: 172.20.10.210,192.168.1.210
    service.cilium.io/forwarding-mode: dsr
  labels:
    bgp.cilium.io/advertise-service: default
    bgp.cilium.io/ip-pool: default
    l2.cilium.io/ip-pool: default
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: whoami
  ports:
    - name: web
      port: 80
      targetPort: http
