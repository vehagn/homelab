apiVersion: v1
kind: Service
metadata:
  name: arp-local-snat
  namespace: whoami
  annotations:
    io.cilium/lb-ipam-ips: 192.168.1.211
    service.cilium.io/forwarding-mode: snat
  labels:
    l2.cilium.io/ip-pool: default
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: whoami
  ports:
    - name: web
      port: 80
      targetPort: http
