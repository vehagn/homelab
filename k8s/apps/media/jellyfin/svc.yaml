apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
  annotations:
    io.cilium/lb-ipam-ips: 172.20.10.20
    service.cilium.io/forwarding-mode: dsr
  labels:
    bgp.cilium.io/advertise-service: default
    bgp.cilium.io/ip-pool: default
spec:
  type: LoadBalancer
  selector:
    app: jellyfin
  ports:
    - name: web
      port: 8096
    - name: udp
      port: 7359
